<html>
<head>
<title>Phishing Detection</title>
</head>

<body>

<h2>Phishing URL Detection</h2>

<form action="/predict" method="post">

URL Length:
<input type="number" name="url_length"><br><br>

Dots:
<input type="number" name="dots"><br><br>

HTTPS (1 or 0):
<input type="number" name="https"><br><br>

Special Characters:
<input type="number" name="special_char"><br><br>

Subdomains:
<input type="number" name="subdomain"><br><br>

<button type="submit">Check URL</button>

</form>

<h3>{{prediction}}</h3>

</body>
</html>
